# Merge this into ~/.codex/config.toml.
# Provider settings are ignored in project-local .codex/config.toml.

[model_providers.wrtn_proxy]
name = "Wrtn Router via local proxy"
base_url = "http://127.0.0.1:8787/v1"
env_key = "WRTN_API_KEY"
wire_api = "responses"
requires_openai_auth = false

[profiles.wrtn]
model = "claude-opus-4-8"
model_provider = "wrtn_proxy"
model_catalog_json = "/absolute/path/to/wrtn-router/config/codex.models.json"
model_reasoning_effort = "max"
model_auto_compact_token_limit = 30000
model_auto_compact_token_limit_scope = "total"
service_tier = "default"
